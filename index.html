<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Earth Time: Вход в Новый Завет</title>
    <!-- Добавляем Google Fonts для соответствия ТЗ -->
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">
    <style>
        /* Reset */
        html, body, div, span, applet, object, iframe,
        h1, h2, h3, h4, h5, h6, p, blockquote, pre,
        a, abbr, acronym, address, big, cite, code,
        del, dfn, em, img, ins, kbd, q, s, samp,
        small, strike, strong, sub, sup, tt, var,
        b, u, i, center,
        dl, dt, dd, ol, ul, li,
        fieldset, form, label, legend,
        table, caption, tbody, tfoot, thead, tr, th, td,
        article, aside, canvas, details, embed, 
        figure, figcaption, footer, header, hgroup, 
        menu, nav, output, ruby, section, summary,
        time, mark, audio, video {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
        }
        
        /* HTML5 display-role reset for older browsers */
        article, aside, details, figcaption, figure, 
        footer, header, hgroup, menu, nav, section {
            display: block;
        }

        body {
            line-height: 1;
            font-family: 'Aldrich', sans-serif; /* Изменен шрифт для соответствия ТЗ */
            background-color: #051428;
            color: #E6F2FF;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .hero-section {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #051428;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #051428 0%, #4B0082 50%, #9370DB 75%, #FFD700 100%);
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .header-text h1 {
            font-size: 3rem;
            text-align: center;
            color: #E6F2FF;
            text-shadow: 0 4px 6px rgba(0,0,0,0.5);
            margin-bottom: 1rem; /* Добавлено для лучшего отображения */
        }

        .header-text p {
            font-size: 1.5rem;
            text-align: center;
            color: #D4D4D4;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 2rem;
            color: #E6F2FF;
            text-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .gallery-item {
            width: 100%;
            height: 300px;
            background-size: cover;
            background-position: center;
            margin-bottom: 2rem;
            transition: transform 0.3s ease-in-out;
            will-change: transform;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .footer {
            width: 100%;
            background-color: #051428;
            color: #D4D4D4;
            padding: 2rem 0;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .header-text h1 {
                font-size: 2.5rem;
            }

            .header-text p {
                font-size: 1.3rem;
            }

            .gallery-item {
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 0.5rem;
            }

            .header-text h1 {
                font-size: 2rem;
            }

            .header-text p {
                font-size: 1.2rem;
            }

            .gallery-item {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container header-text">
            <h1>New Earth Time: Вход в Новый Завет</h1>
            <p>Хватит ждать будущего, начните проживать его прямо сейчас. Переход от 3D ограничений к свободе Сущности.</p>
        </div>
    </div>

    <section class="container">
        <div class="section-title">Сдвиг Осознания</div>
        <div class="gallery-item" style="background-image: url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50,50 M40,90 Q60,70 80,90 Z' fill='%23E6F2FF'/></svg>)"></div>
        <div class="gallery-item" style="background-image: url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50,50 M90,40 Q70,60 90,80 Z' fill='%23E6F2FF'/></svg>)"></div>
        <div class="gallery-item" style="background-image: url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50,50 M60,40 Q80,60 60,80 Z' fill='%23E6F2FF'/></svg>)"></div>
        <div class="gallery-item" style="background-image: url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50,50 M70,40 Q90,60 70,80 Z' fill='%23E6F2FF'/></svg>)"></div>
        <div class="gallery-item" style="background-image: url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50,50 M80,40 Q60,60 80,80 Z' fill='%23E6F2FF'/></svg>)"></div>
        <div class="gallery-item" style="background-image: url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50,50 M90,40 Q70,60 90,80 Z' fill='%23E6F2FF'/></svg>)"></div>
        <div class="gallery-item" style="background-image: url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50,50 M40,90 Q60,70 80,90 Z' fill='%23E6F2FF'/></svg>)"></div>
    </section>

    <footer class="container">
        <p>Новый Завет</p>
        <p>Контакты: example@example.com</p>
        <p>Манифест проекта: Мы живем в 3D, но мы можем перейти в 5D.</p>
    </footer>

    <script>
        window.addEventListener('scroll', function() {
            const body = document.body;
            if (body) { // Проверка на существование элемента перед применением стиля
                body.style.background = `linear-gradient(45deg, #051428 0%, #4B0082 50%, #9370DB 75%, #FFD700 100%)`;
            }
        });
    </script>
</body>
</html>
